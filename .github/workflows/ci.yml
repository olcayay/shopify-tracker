name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo lint

      - name: Typecheck
        run: npx turbo typecheck

      - name: Test
        run: npm test

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint --ignore DL3018 --ignore DL3008 Dockerfile.api
          hadolint --ignore DL3018 --ignore DL3008 Dockerfile.dashboard
          hadolint --ignore DL3018 --ignore DL3008 Dockerfile.worker

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-typecheck-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo build

      - name: Upload Sentry source maps (dashboard)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set — skipping source map upload"
            exit 0
          fi
          npx @sentry/cli releases files "$GITHUB_SHA" upload-sourcemaps \
            apps/dashboard/.next/static \
            --url-prefix "~/_next/static" \
            --rewrite \
            || echo "Source map upload failed (non-fatal)"

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-typecheck-test

    strategy:
      matrix:
        dockerfile:
          - { file: Dockerfile.api, name: api }
          - { file: Dockerfile.dashboard, name: dashboard }
          - { file: Dockerfile.worker, name: worker }

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (${{ matrix.dockerfile.name }})
        run: |
          docker build \
            -f ${{ matrix.dockerfile.file }} \
            --build-arg NEXT_PUBLIC_API_URL=https://api.appranks.io \
            -t appranks-${{ matrix.dockerfile.name }}:ci \
            .

      - name: Verify image was created
        run: docker image inspect appranks-${{ matrix.dockerfile.name }}:ci > /dev/null

