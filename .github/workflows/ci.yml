name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo lint

      - name: Typecheck
        run: npx turbo typecheck

      - name: Test
        run: npm test

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint --ignore DL3018 --ignore DL3008 Dockerfile.api
          hadolint --ignore DL3018 --ignore DL3008 Dockerfile.dashboard
          hadolint --ignore DL3018 --ignore DL3008 Dockerfile.worker

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-typecheck-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo build

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-typecheck-test

    strategy:
      matrix:
        dockerfile:
          - { file: Dockerfile.api, name: api }
          - { file: Dockerfile.dashboard, name: dashboard }
          - { file: Dockerfile.worker, name: worker }

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (${{ matrix.dockerfile.name }})
        run: |
          docker build \
            -f ${{ matrix.dockerfile.file }} \
            --build-arg NEXT_PUBLIC_API_URL=https://api.appranks.io \
            -t appranks-${{ matrix.dockerfile.name }}:ci \
            .

      - name: Verify image was created
        run: docker image inspect appranks-${{ matrix.dockerfile.name }}:ci > /dev/null

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Coolify deployment
        run: |
          if [ -z "${{ secrets.COOLIFY_WEBHOOK_URL }}" ]; then
            echo "COOLIFY_WEBHOOK_URL not set — skipping deploy"
            exit 0
          fi
          curl -f -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            || echo "Deploy trigger sent (Coolify will handle the build)"

      - name: Wait for deployment health check
        if: ${{ secrets.COOLIFY_WEBHOOK_URL != '' }}
        run: |
          echo "Waiting 60s for deployment..."
          sleep 60
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.appranks.io/health/live || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE — retrying in 15s..."
            sleep 15
          done
          echo "Warning: Health check didn't pass after 3 attempts (deploy may still be in progress)"
