name: Deploy to GCP

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: olcayay
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/olcayay/appranks-api:latest
            ghcr.io/olcayay/appranks-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: |
            ghcr.io/olcayay/appranks-dashboard:latest
            ghcr.io/olcayay/appranks-dashboard:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.appranks.io
            NEXT_PUBLIC_GA_ID=${{ secrets.GA_ID }}
            NEXT_PUBLIC_CLARITY_ID=${{ secrets.CLARITY_ID }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ghcr.io/olcayay/appranks-worker:latest
            ghcr.io/olcayay/appranks-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build and push Worker-Interactive
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker-interactive
          push: true
          tags: |
            ghcr.io/olcayay/appranks-worker-interactive:latest
            ghcr.io/olcayay/appranks-worker-interactive:${{ github.sha }}
          cache-from: type=gha,scope=worker-interactive
          cache-to: type=gha,scope=worker-interactive,mode=max

      - name: Build and push Worker-Email
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker-email
          push: true
          tags: |
            ghcr.io/olcayay/appranks-worker-email:latest
            ghcr.io/olcayay/appranks-worker-email:${{ github.sha }}
          cache-from: type=gha,scope=worker-email
          cache-to: type=gha,scope=worker-email,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/appranks-gcp
          chmod 600 ~/.ssh/appranks-gcp
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/157592426693/locations/global/workloadIdentityPools/github/providers/github-actions
          service_account: github-deploy@appranks-web-app.iam.gserviceaccount.com

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to API VM
        run: |
          ssh -i ~/.ssh/appranks-gcp deploy@34.62.80.10 \
            "cd /opt/appranks && sudo docker compose pull && sudo docker compose up -d"

      - name: Deploy to Worker VMs
        run: |
          for vm in appranks-scraper appranks-email appranks-ai; do
            echo "Deploying to $vm..."
            gcloud compute ssh "deploy@$vm" --zone=europe-west1-b \
              --command="cd /opt/appranks && sudo docker compose pull && sudo docker compose up -d" \
              --tunnel-through-iap --quiet \
              || echo "WARNING: $vm deploy failed (may be preempted)"
          done

      - name: Health check
        run: |
          sleep 10
          for i in 1 2 3; do
            if curl -sf https://api.appranks.io/health/live; then
              echo " Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed"
          exit 1
