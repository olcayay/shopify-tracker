name: Deploy to GCP

on:
  push:
    branches: [main]
    paths-ignore:
      - 'files/**'
      - '*.md'
      - 'docs/**'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: olcayay
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/olcayay/appranks-api:latest
            ghcr.io/olcayay/appranks-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: |
            ghcr.io/olcayay/appranks-dashboard:latest
            ghcr.io/olcayay/appranks-dashboard:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.appranks.io
            NEXT_PUBLIC_GA_ID=${{ secrets.GA_ID }}
            NEXT_PUBLIC_CLARITY_ID=${{ secrets.CLARITY_ID }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ghcr.io/olcayay/appranks-worker:latest
            ghcr.io/olcayay/appranks-worker:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build and push Worker-Interactive
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker-interactive
          push: true
          tags: |
            ghcr.io/olcayay/appranks-worker-interactive:latest
            ghcr.io/olcayay/appranks-worker-interactive:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=worker-interactive
          cache-to: type=gha,scope=worker-interactive,mode=max

      - name: Build and push Worker-Email
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker-email
          push: true
          tags: |
            ghcr.io/olcayay/appranks-worker-email:latest
            ghcr.io/olcayay/appranks-worker-email:${{ github.sha }}
          cache-from: type=gha,scope=worker-email
          cache-to: type=gha,scope=worker-email,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/157592426693/locations/global/workloadIdentityPools/github/providers/github-actions
          service_account: github-deploy@appranks-web-app.iam.gserviceaccount.com

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to all VMs
        run: |
          FAILED=""
          DEPLOY_CMD="cd /opt/appranks && sudo docker compose pull && sudo docker compose up -d"
          SSH_OPTS="--zone=europe-west1-b --tunnel-through-iap --quiet --ssh-key-expire-after=5m"

          # Required VMs (on-demand instances)
          for vm in appranks-api appranks-email; do
            echo "::group::Deploying to $vm"
            if gcloud compute ssh "deploy@$vm" $SSH_OPTS --command="$DEPLOY_CMD"; then
              echo "✓ $vm deployed successfully"
            else
              echo "::error::$vm deploy failed"
              FAILED="$FAILED $vm"
            fi
            echo "::endgroup::"
          done

          # Optional VMs (Spot instances, may be preempted)
          for vm in appranks-scraper appranks-ai; do
            echo "::group::Deploying to $vm (optional, Spot)"
            gcloud compute ssh "deploy@$vm" $SSH_OPTS --command="$DEPLOY_CMD" \
              || echo "::warning::$vm deploy failed (Spot VM may be preempted)"
            echo "::endgroup::"
          done

          if [ -n "$FAILED" ]; then
            echo "::error::Deploy failed for:$FAILED"
            exit 1
          fi

      - name: Health check
        run: |
          echo "Waiting 15s for containers to start..."
          sleep 15
          for i in 1 2 3; do
            if curl -sf https://api.appranks.io/health/live; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::Health check failed after 3 attempts"
          exit 1
