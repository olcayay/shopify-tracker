services:
  migrate:
    image: ghcr.io/olcayay/appranks-api:latest
    restart: "no"
    command: ["node", "packages/db/dist/migrate.js"]
    env_file: .env

  api:
    image: ghcr.io/olcayay/appranks-api:latest
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully

  dashboard:
    image: ghcr.io/olcayay/appranks-dashboard:latest
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.appranks.io}
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - api

  alloy:
    image: grafana/alloy:v1.5.1
    restart: always
    volumes:
      - ./alloy.river:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: [run, /etc/alloy/config.alloy, --stability.level=generally-available]
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 256M
